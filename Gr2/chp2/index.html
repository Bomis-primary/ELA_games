<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 2 Mystery Box Game</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:linear-gradient(to bottom,#a0eaff,#f7f0ff);display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;flex-direction:column;}
#instructions{font-size:18px;font-weight:bold;margin-bottom:15px;text-align:center;max-width:600px;}
#logo-screen,#game-screen,#result-screen{position:absolute;width:100%;height:100%;display:none;justify-content:center;align-items:center;flex-direction:column;}
#logo-screen img{width:60%;max-width:400px;}
#question-box{position:relative;width:250px;height:250px;perspective:800px;cursor:pointer;margin-top:10px;}
.box{width:100%;height:100%;position:relative;border-radius:20px;background:#ffde7d;box-shadow: 0 8px 20px rgba(0,0,0,0.3);}
.lid,.base{width:100%;height:50%;position:absolute;left:0;transform-origin:top center;transition: transform 1s ease;border-radius:20px;}
.lid{top:0;background:#ffb74d;z-index:2;border-bottom:3px solid #c87f2b;}
.base{bottom:0;background:#ffe0a1;border-top:3px solid #c87f2b;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:48px;}
.open .lid{transform: rotateX(-120deg);}
#objects{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
#word{margin-top:10px;font-weight:bold;font-size:24px;text-align:center;}
#answers{margin-top:10px;display:flex;gap:15px;flex-wrap:wrap;justify-content:center;}
.answer-btn{background:#ffdd99;border:none;padding:15px 25px;border-radius:10px;font-size:18px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
.answer-btn:hover{transform:scale(1.1);box-shadow:2px 2px 10px rgba(0,0,0,0.3);}
#score{margin-top:15px;font-size:20px;font-weight:bold;}
#restart-btn{padding:15px 30px;font-size:20px;margin-top:20px;background:#5cb85c;color:white;border:none;border-radius:10px;cursor:pointer;}
#volume-control{position:fixed;top:10px;right:10px;}
.confetti-piece{position:absolute;width:10px;height:10px;animation:fall 2s linear forwards;}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);}100%{transform:translateY(500px) rotate(360deg);opacity:0;}}
</style>
</head>
<body>

<div id="volume-control">Volume: <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1"></div>

<!-- Full-page logo screen -->
<div id="logo-screen">
  <img src="assets/innovinelogo.png" alt="Innovine Logo">
</div>

<!-- Game screen -->
<div id="game-screen">
  <div id="instructions">
    Click on the box to reveal a noun. Decide whether it is singular or plural and click on the correct option.
  </div>
  <div id="question-box">
    <div class="box" id="box">
      <div class="lid"></div>
      <div class="base">
        <div id="objects"></div>
        <div id="word"></div>
      </div>
    </div>
  </div>
  <div id="answers"></div>
  <div id="score"></div>
</div>

<div id="result-screen">
  <h1>Well Done!</h1>
  <div id="final-score"></div>
  <button id="restart-btn">Restart</button>
</div>

<audio id="correct-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="clap-sound" src="assets/clapping.mp3"></audio>

<script>
// 15 unique emoji objects
const questions = [
  {emoji:'🐱', count:1, singular:true, word:'cat'},
  {emoji:'🐶', count:1, singular:true, word:'dog'},
  {emoji:'🍎', count:1, singular:true, word:'apple'},
  {emoji:'🥭', count:2, singular:false, word:'mangoes'},
  {emoji:'🌸', count:1, singular:true, word:'flower'},
  {emoji:'🐦', count:1, singular:true, word:'bird'},
  {emoji:'🪑', count:2, singular:false, word:'benches'},
  {emoji:'👗', count:2, singular:false, word:'dresses'},
  {emoji:'🎈', count:1, singular:true, word:'balloon'},
  {emoji:'👩', count:1, singular:true, word:'lady'},
  {emoji:'🍬', count:1, singular:true, word:'sweet'},
  {emoji:'🍦', count:1, singular:true, word:'ice cream'},
  {emoji:'🚗', count:1, singular:true, word:'car'},
  {emoji:'🐒', count:1, singular:true, word:'monkey'},
  {emoji:'🌳', count:1, singular:true, word:'tree'}
];

let shuffledQuestions = [];
let currentQuestion = 0;
let score = 0;

const logoScreen = document.getElementById('logo-screen');
const gameScreen = document.getElementById('game-screen');
const questionBox = document.getElementById('question-box');
const boxDiv = document.getElementById('box');
const objectsDiv = document.getElementById('objects');
const wordDiv = document.getElementById('word');
const answersDiv = document.getElementById('answers');
const scoreDiv = document.getElementById('score');
const resultScreen = document.getElementById('result-screen');
const finalScoreDiv = document.getElementById('final-score');
const restartBtn = document.getElementById('restart-btn');
const volumeSlider = document.getElementById('volumeSlider');

const correctSound = document.getElementById('correct-sound');
const wrongSound = document.getElementById('wrong-sound');
const clapSound = document.getElementById('clap-sound');

volumeSlider.addEventListener('input', ()=>{
  const vol = volumeSlider.value;
  correctSound.volume = vol;
  wrongSound.volume = vol;
  clapSound.volume = vol;
});

function shuffle(array){ return array.sort(()=>Math.random()-0.5); }

function startGame(){
  logoScreen.style.display='flex';
  gameScreen.style.display='none';
  resultScreen.style.display='none';
  shuffledQuestions = shuffle([...questions]);
  currentQuestion = 0;
  score = 0;

  // Wait 5 seconds or allow click to continue
  setTimeout(()=>showNextScreen(),5000);
  logoScreen.onclick = ()=>showNextScreen();
}

function showNextScreen(){
  logoScreen.style.display='none';
  gameScreen.style.display='flex';
  showQuestion();
}

function showQuestion(){
  answersDiv.innerHTML=''; objectsDiv.innerHTML=''; wordDiv.innerHTML='';
  boxDiv.classList.remove('open');
  scoreDiv.innerText = `Score: ${score} / ${shuffledQuestions.length}`;
  questionBox.onclick = revealBox;
}

function revealBox(){
  const q = shuffledQuestions[currentQuestion];
  boxDiv.classList.add('open');
  setTimeout(()=>{
    objectsDiv.innerHTML = '';
    for(let i=0;i<q.count;i++) objectsDiv.innerHTML += q.emoji;
    wordDiv.innerText = q.word;
    ['Singular','Plural'].forEach(opt=>{
      const btn = document.createElement('button');
      btn.classList.add('answer-btn');
      btn.innerText = opt;
      btn.onclick = ()=>checkAnswer(opt,q);
      answersDiv.appendChild(btn);
    });
  },800);
  questionBox.onclick = null;
}

function checkAnswer(selected,q){
  const correct = (q.singular && selected==='Singular') || (!q.singular && selected==='Plural');
  if(correct){score++; playSound(correctSound); celebrate();}
  else playSound(wrongSound);
  currentQuestion++;
  setTimeout(()=>{
    if(currentQuestion<shuffledQuestions.length) showQuestion();
    else endGame();
  },1000);
}

function playSound(audio){ audio.currentTime=0; audio.play(); }
function celebrate(){
  for(let i=0;i<30;i++){
    const confetti=document.createElement('div');
    confetti.classList.add('confetti-piece');
    confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;
    confetti.style.left=Math.random()*100+'%';
    confetti.style.animationDuration=1+Math.random()*1.5+'s';
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(),2000);
  }
}

function endGame(){
  gameScreen.style.display='none';
  resultScreen.style.display='flex';
  finalScoreDiv.innerText=`Your Score: ${score} / ${shuffledQuestions.length}`;
  playSound(clapSound);
}

restartBtn.onclick=startGame;
startGame();
</script>

</body>
</html>
