<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singular & Plural Mystery Box Game</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(to bottom, #ffe6f0, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
#logo-screen, #game-screen, #result-screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#logo-screen img {
  width: 250px;
}
#question-box {
  background: #fff3cd;
  border: 3px dashed #f0ad4e;
  padding: 30px;
  text-align: center;
  border-radius: 15px;
  box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 200px;
  width: 200px;
}
#question-box img {
  max-width: 100%;
  max-height: 100%;
}
#answers {
  margin-top: 20px;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
}
.answer-btn {
  background: #ffdd99;
  border: none;
  padding: 15px 25px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.answer-btn:hover {
  transform: scale(1.1);
  box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}
#score {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}
#restart-btn {
  padding: 15px 30px;
  font-size: 20px;
  margin-top: 20px;
  background: #5cb85c;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
#volume-control {
  position: fixed;
  top: 10px;
  right: 10px;
}
.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  animation: fall 2s linear forwards;
}
@keyframes fall {
  0% { transform: translateY(0) rotate(0deg);}
  100% { transform: translateY(500px) rotate(360deg); opacity: 0;}
}
</style>
</head>
<body>

<!-- Volume control -->
<div id="volume-control">
  Volume: <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
</div>

<!-- Logo screen -->
<div id="logo-screen">
  <img src="innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game screen -->
<div id="game-screen">
  <div id="question-box">Click to reveal the noun!</div>
  <div id="answers"></div>
  <div id="score"></div>
</div>

<!-- Result screen -->
<div id="result-screen">
  <h1>Well Done!</h1>
  <div id="final-score"></div>
  <button id="restart-btn">Restart</button>
</div>

<!-- Audio -->
<audio id="correct-sound" src="correct.mp3"></audio>
<audio id="wrong-sound" src="wrong.mp3"></audio>
<audio id="clap-sound" src="clapping.mp3"></audio>

<script>
// Questions with image file (replace 'cat.png' etc. with your actual asset files)
const questions = [
  {img: "cat.png", singular:true},
  {img: "dogs.png", singular:false},
  {img: "apple.png", singular:true},
  {img: "books.png", singular:false},
  {img: "tree.png", singular:true},
  {img: "flowers.png", singular:false}
];

let shuffledQuestions = [];
let currentQuestion = 0;
let score = 0;

// DOM elements
const logoScreen = document.getElementById('logo-screen');
const gameScreen = document.getElementById('game-screen');
const questionBox = document.getElementById('question-box');
const answersDiv = document.getElementById('answers');
const scoreDiv = document.getElementById('score');
const resultScreen = document.getElementById('result-screen');
const finalScoreDiv = document.getElementById('final-score');
const restartBtn = document.getElementById('restart-btn');
const volumeSlider = document.getElementById('volumeSlider');

const correctSound = document.getElementById('correct-sound');
const wrongSound = document.getElementById('wrong-sound');
const clapSound = document.getElementById('clap-sound');

// Volume control
volumeSlider.addEventListener('input', () => {
  const vol = volumeSlider.value;
  correctSound.volume = vol;
  wrongSound.volume = vol;
  clapSound.volume = vol;
});

// Shuffle array
function shuffle(array) { return array.sort(()=>Math.random()-0.5); }

// Initialize game
function startGame() {
  logoScreen.style.display = 'flex';
  gameScreen.style.display = 'none';
  resultScreen.style.display = 'none';
  shuffledQuestions = shuffle([...questions]);
  currentQuestion = 0;
  score = 0;
  setTimeout(()=> {
    logoScreen.style.display='none';
    gameScreen.style.display='flex';
    showQuestion();
  },5000);
}

// Show question
function showQuestion(){
  answersDiv.innerHTML='';
  scoreDiv.innerText = `Score: ${score} / ${shuffledQuestions.length}`;
  questionBox.innerHTML='Click to reveal the noun!';
  questionBox.onclick = revealNoun;
}

// Reveal noun image and show singular/plural options
function revealNoun(){
  const q = shuffledQuestions[currentQuestion];
  questionBox.innerHTML = `<img src="${q.img}" alt="noun">`;

  ['Singular','Plural'].forEach(opt=>{
    const btn = document.createElement('button');
    btn.classList.add('answer-btn');
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(opt, q);
    answersDiv.appendChild(btn);
  });

  questionBox.onclick = null;
}

// Check answer
function checkAnswer(selected,q){
  const correct = (q.singular && selected==='Singular') || (!q.singular && selected==='Plural');
  if(correct){
    score++;
    playSound(correctSound);
    celebrate();
  } else playSound(wrongSound);

  currentQuestion++;
  setTimeout(()=>{
    if(currentQuestion<shuffledQuestions.length) showQuestion();
    else endGame();
  },1000);
}

// Play sound
function playSound(audio){ audio.currentTime=0; audio.play(); }

// Celebration animation
function celebrate(){
  for(let i=0;i<30;i++){
    const confetti = document.createElement('div');
    confetti.classList.add('confetti-piece');
    confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;
    confetti.style.left=Math.random()*100+'%';
    confetti.style.animationDuration=1+Math.random()*1.5+'s';
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(),2000);
  }
}

// End game
function endGame(){
  gameScreen.style.display='none';
  resultScreen.style.display='flex';
  finalScoreDiv.innerText=`Your Score: ${score} / ${shuffledQuestions.length}`;
  playSound(clapSound);
}

restartBtn.onclick=startGame;
startGame();
</script>

</body>
</html>
