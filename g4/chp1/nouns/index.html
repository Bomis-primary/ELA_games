<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 4 Nouns - Spin the Wheel</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(120deg, #4a90e2, #50e3c2);
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #fff;
  }

  #logo {
    width: 150px;
    display: none;
    margin-bottom: 20px;
  }

  #game-container {
    display: none;
    flex-direction: column;
    align-items: center;
  }

  #wheel-container {
    position: relative;
    width: 300px;
    height: 300px;
    margin-bottom: 20px;
  }

  #wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 5px solid #fff;
    position: relative;
    overflow: hidden;
  }

  #wheel div {
    position: absolute;
    width: 50%;
    height: 50%;
    background: rgba(255,255,255,0.2);
    transform-origin: 100% 100%;
    text-align: right;
    padding: 10px;
    box-sizing: border-box;
  }

  #spin-btn {
    padding: 10px 20px;
    background-color: #f5a623;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  #sentence-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #noun-input {
    padding: 10px;
    font-size: 18px;
    width: 300px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
  }

  #teacher-buttons button {
    padding: 10px 20px;
    margin: 0 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  #teacher-buttons #correct { background-color: green; color: #fff; }
  #teacher-buttons #wrong { background-color: red; color: #fff; }

  #feedback { margin-top: 10px; font-size: 18px; font-weight: bold; }

  /* Floating bubbles */
  .bubble {
    position: absolute;
    background: #d7ff4a;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    animation: float 6s infinite;
    opacity: 0.7;
  }

  @keyframes float {
    0% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-200px) translateX(100px); }
    100% { transform: translateY(0) translateX(0); }
  }

</style>
</head>
<body>

<img src="g4/chp1/nouns/assets/logo.png" id="logo" alt="Innovine Logo">

<div id="game-container">
  <div id="wheel-container">
    <div id="wheel"></div>
  </div>

  <button id="spin-btn">Spin the Wheel</button>

  <div id="sentence-container">
    <input type="text" id="noun-input" placeholder="Type a sentence using the noun type">
    <div id="teacher-buttons">
      <button id="correct">Correct</button>
      <button id="wrong">Wrong</button>
    </div>
    <div id="feedback"></div>
  </div>
</div>

<script>
const logo = document.getElementById('logo');
const gameContainer = document.getElementById('game-container');
const wheel = document.getElementById('wheel');
const spinBtn = document.getElementById('spin-btn');
const feedback = document.getElementById('feedback');
const nounInput = document.getElementById('noun-input');
const correctBtn = document.getElementById('correct');
const wrongBtn = document.getElementById('wrong');

const nouns = ['Common', 'Proper', 'Abstract', 'Collective', 'Concrete'];
let currentNoun = '';
let rotation = 0;

function createWheel() {
  for (let i = 0; i < nouns.length; i++) {
    const div = document.createElement('div');
    div.style.transform = `rotate(${i * 72}deg) skewY(-36deg)`;
    div.textContent = nouns[i];
    div.style.fontSize = "16px";
    div.style.fontWeight = "bold";
    wheel.appendChild(div);
  }
}

// Show Innovine logo for 2.5 seconds
logo.style.display = "block";
setTimeout(() => {
  logo.style.display = "none";
  gameContainer.style.display = "flex";
}, 2500);

// Spin the wheel
spinBtn.addEventListener('click', () => {
  const rand = Math.floor(Math.random() * nouns.length);
  const degrees = rand * 72 + 1440 + rotation; 
  rotation += degrees;
  wheel.style.transition = 'transform 4s ease-out';
  wheel.style.transform = `rotate(${rotation}deg)`;
  setTimeout(() => {
    currentNoun = nouns[rand];
    feedback.textContent = `Pin landed on: ${currentNoun}`;
  }, 4000);
});

// Teacher buttons
correctBtn.addEventListener('click', () => {
  feedback.textContent = "Marked Correct!";
  nounInput.value = '';
});
wrongBtn.addEventListener('click', () => {
  feedback.textContent = "Marked Wrong!";
});

createWheel();

// Create floating bubbles
for(let i=0;i<20;i++){
  const bubble = document.createElement('div');
  bubble.classList.add('bubble');
  bubble.style.left = Math.random()*100 + 'vw';
  bubble.style.top = Math.random()*100 + 'vh';
  bubble.style.animationDuration = (4+Math.random()*4) + 's';
  document.body.appendChild(bubble);
}
</script>
</body>
</html>
